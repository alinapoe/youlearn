<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phrasal Verbs — YouLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(56,70,79,0.08);
    }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 32px;
      display: block;
      text-decoration: none;
      text-align: center;
    }
    .logo span:first-child { color: #785fb3; }
    .logo span:last-child  { color: #00bf90; }
    .product-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f5f2fb;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 28px;
    }
    .product-icon {
      font-size: 2.2rem;
      line-height: 1;
    }
    .product-info { flex: 1; }
    .product-label { font-size: 0.70rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #785fb3; margin-bottom: 2px; }
    .product-name { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 800; color: #38464f; }
    .product-price { font-size: 1.1rem; font-weight: 800; color: #785fb3; white-space: nowrap; }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #38464f;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.88rem;
      color: #8a96a0;
      line-height: 1.5;
      margin-bottom: 26px;
    }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.82rem; font-weight: 600; color: #38464f; }
    input {
      border: 1.5px solid #e0dde8;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #38464f;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #785fb3; }
    .btn-pagar {
      display: block;
      text-align: center;
      background: #785fb3;
      color: white;
      border: none;
      border-radius: 100px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
      text-decoration: none;
    }
    .btn-pagar:hover { background: #6a50a3; }
    .note {
      margin-top: 18px;
      font-size: 0.76rem;
      color: #b0b8bf;
      text-align: center;
      line-height: 1.5;
    }
    @media (max-width: 520px) {
      .card { padding: 32px 20px; }
    }
  </style>
</head>
<body>
<div class="card">
  <a class="logo" href="/"><span>You</span><span>Learn</span></a>

  <div class="product-row">
    <div class="product-icon">📚</div>
    <div class="product-info">
      <div class="product-label">Ebook</div>
      <div class="product-name">Phrasal Verbs</div>
    </div>
    <div class="product-price">$14.000</div>
  </div>

  <h1>¿A dónde te enviamos el ebook?</h1>
  <p class="subtitle">Completá tus datos y en cuanto confirmemos el pago te lo mandamos al instante.</p>

  <form class="form" id="checkoutForm">
    <div class="field">
      <label for="name">Tu nombre</label>
      <input type="text" id="name" placeholder="ej. María" required autocomplete="given-name">
    </div>
    <div class="field">
      <label for="email">Tu email</label>
      <input type="email" id="email" placeholder="ej. maria@gmail.com" required autocomplete="email">
    </div>
    <button type="submit" class="btn-pagar">Ir a pagar con tarjeta →</button>
  </form>

  <p class="note">Pago seguro con Mercado Pago · Recibís el ebook por mail al instante</p>
</div>

<script>
  document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn   = e.submitter;
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) return;

    btn.textContent = 'Preparando el pago...';
    btn.disabled = true;

    try {
      const res  = await fetch('/api/create-preference', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email }),
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error();
      }
    } catch {
      btn.textContent = 'Ir a pagar con tarjeta →';
      btn.disabled = false;
      alert('Hubo un error. Por favor intentá de nuevo o escribinos por WhatsApp.');
    }
  });
</script>
</body>
</html>
